<svg width="100%" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; fill: #ffffff; }
    .th { font-size: 14px; font-weight: 600; fill: #ffffff; }
    .ts { font-size: 12px; font-weight: 400; fill: #cccccc; }
    .arr { stroke: #aaaaaa; stroke-width: 1.5; fill: none; }
  </style>
</defs>

<!-- Background -->
<rect width="680" height="700" fill="#0d0d0d" rx="16"/>

<!-- ===== STAGE 1: MRI INPUT ===== -->
<rect x="40" y="30" width="120" height="56" rx="8" fill="#1a1a3e" stroke="#7986cb" stroke-width="1.5"/>
<text class="th" x="100" y="52" text-anchor="middle" dominant-baseline="central">MRI input</text>
<text class="ts" x="100" y="70" text-anchor="middle" dominant-baseline="central">224 × 224</text>

<!-- Arrow: Input to U-Net -->
<line x1="160" y1="58" x2="198" y2="58" stroke="#7986cb" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== STAGE 2: U-NET ===== -->
<rect x="200" y="20" width="180" height="76" rx="8" fill="#0d2137" stroke="#42a5f5" stroke-width="1.5"/>
<text class="th" x="290" y="44" text-anchor="middle" dominant-baseline="central">U-Net (4.5M)</text>
<text class="ts" x="290" y="62" text-anchor="middle" dominant-baseline="central">MobileNetV2 encoder</text>
<text class="ts" x="290" y="80" text-anchor="middle" dominant-baseline="central">+ ASPP bridge</text>

<!-- Arrow: U-Net to Tumor Mask -->
<line x1="380" y1="58" x2="418" y2="58" stroke="#42a5f5" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== STAGE 3: TUMOR MASK ===== -->
<rect x="420" y="20" width="220" height="76" rx="8" fill="#0d2a2e" stroke="#26c6da" stroke-width="1.5"/>
<text class="th" x="530" y="44" text-anchor="middle" dominant-baseline="central">Binary tumor mask</text>
<text class="ts" x="530" y="62" text-anchor="middle" dominant-baseline="central">Probability map output</text>
<text class="ts" x="530" y="80" text-anchor="middle" dominant-baseline="central">Segmentation result</text>

<!-- Arrow: Tumor Mask down to Masked Image -->
<line x1="530" y1="96" x2="530" y2="154" stroke="#26c6da" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== STAGE 4: MASKED IMAGE ===== -->
<rect x="420" y="156" width="220" height="56" rx="8" fill="#0d2a2e" stroke="#26c6da" stroke-width="1.5"/>
<text class="th" x="530" y="178" text-anchor="middle" dominant-baseline="central">Masked image</text>
<text class="ts" x="530" y="196" text-anchor="middle" dominant-baseline="central">Tumor ROI extracted</text>

<!-- Arrow: Masked Image → down and left into Classifier -->
<path d="M530 212 L530 240 L340 240 L340 270" fill="none" stroke="#26c6da" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== STAGE 5: CLASSIFIER CONTAINER ===== -->
<rect x="60" y="272" width="560" height="180" rx="10" fill="#1a0d2e" stroke="#7e57c2" stroke-width="1.5"/>
<text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central">NeuroFusionNet classifier (8M params)</text>

<!-- Sub: MobileNetV2 CNN -->
<rect x="80" y="312" width="160" height="116" rx="8" fill="#0d2137" stroke="#42a5f5" stroke-width="1.5"/>
<text class="th" x="160" y="336" text-anchor="middle" dominant-baseline="central">MobileNetV2</text>
<text class="ts" x="160" y="354" text-anchor="middle" dominant-baseline="central">CNN backbone</text>
<text class="ts" x="160" y="372" text-anchor="middle" dominant-baseline="central">Local features</text>
<text class="ts" x="160" y="390" text-anchor="middle" dominant-baseline="central">Spatial patterns</text>
<text class="ts" x="160" y="408" text-anchor="middle" dominant-baseline="central">Conv + pooling</text>

<!-- Arrow: CNN → Transformer -->
<line x1="240" y1="370" x2="264" y2="370" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Sub: 4-Layer Transformer -->
<rect x="266" y="312" width="160" height="116" rx="8" fill="#0d2a2e" stroke="#26c6da" stroke-width="1.5"/>
<text class="th" x="346" y="336" text-anchor="middle" dominant-baseline="central">Transformer</text>
<text class="ts" x="346" y="354" text-anchor="middle" dominant-baseline="central">4-layer encoder</text>
<text class="ts" x="346" y="372" text-anchor="middle" dominant-baseline="central">Global context</text>
<text class="ts" x="346" y="390" text-anchor="middle" dominant-baseline="central">Self-attention</text>
<text class="ts" x="346" y="408" text-anchor="middle" dominant-baseline="central">Positional embed</text>

<!-- Arrow: Transformer → SE Fusion -->
<line x1="426" y1="370" x2="450" y2="370" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Sub: SE-Gated Fusion Head -->
<rect x="452" y="312" width="148" height="116" rx="8" fill="#2a0d1a" stroke="#f06292" stroke-width="1.5"/>
<text class="th" x="526" y="336" text-anchor="middle" dominant-baseline="central">SE-Gated</text>
<text class="th" x="526" y="354" text-anchor="middle" dominant-baseline="central">fusion head</text>
<text class="ts" x="526" y="372" text-anchor="middle" dominant-baseline="central">Channel attention</text>
<text class="ts" x="526" y="390" text-anchor="middle" dominant-baseline="central">Squeeze-excite</text>
<text class="ts" x="526" y="408" text-anchor="middle" dominant-baseline="central">Feature reweighting</text>

<!-- Arrow: Classifier → down to row 6 -->
<line x1="340" y1="452" x2="340" y2="480" stroke="#7e57c2" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ===== STAGE 6a: XAI SUITE ===== -->
<rect x="60" y="482" width="260" height="116" rx="8" fill="#2a2000" stroke="#ffca28" stroke-width="1.5"/>
<text class="th" x="190" y="506" text-anchor="middle" dominant-baseline="central">XAI explainability suite</text>
<text class="ts" x="190" y="524" text-anchor="middle" dominant-baseline="central">Grad-CAM heatmaps</text>
<text class="ts" x="190" y="542" text-anchor="middle" dominant-baseline="central">Grad-CAM++ maps</text>
<text class="ts" x="190" y="560" text-anchor="middle" dominant-baseline="central">Attention visualization</text>
<text class="ts" x="190" y="578" text-anchor="middle" dominant-baseline="central">SHAP / LIME analysis</text>

<!-- ===== STAGE 6b: CLASSIFICATION OUTPUT ===== -->
<rect x="360" y="482" width="260" height="116" rx="8" fill="#0d2010" stroke="#66bb6a" stroke-width="1.5"/>
<text class="th" x="490" y="506" text-anchor="middle" dominant-baseline="central">Classification output</text>
<text class="ts" x="490" y="524" text-anchor="middle" dominant-baseline="central">4 tumor classes</text>
<text class="ts" x="490" y="542" text-anchor="middle" dominant-baseline="central">Glioma · Meningioma</text>
<text class="ts" x="490" y="560" text-anchor="middle" dominant-baseline="central">Pituitary · No tumor</text>
<text class="ts" x="490" y="578" text-anchor="middle" dominant-baseline="central">+ confidence score</text>

<!-- Arrows from both boxes down to LLM Report -->
<line x1="190" y1="598" x2="190" y2="628" stroke="#ffca28" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="490" y1="598" x2="490" y2="628" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="190" y1="636" x2="310" y2="636" stroke="#9e9e9e" stroke-width="1"/>
<line x1="490" y1="636" x2="370" y2="636" stroke="#9e9e9e" stroke-width="1"/>

<!-- ===== STAGE 7: LLM REPORT GENERATOR ===== -->
<rect x="120" y="628" width="440" height="56" rx="8" fill="#2a0d1a" stroke="#e91e63" stroke-width="1.5"/>
<text class="th" x="340" y="650" text-anchor="middle" dominant-baseline="central">LLM clinical report generator</text>
<text class="ts" x="340" y="668" text-anchor="middle" dominant-baseline="central">Google Gemini · Groq · structured templates</text>
</svg>
