<svg width="100%" viewBox="0 0 780 160" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; }
    .title { font-size: 13px; font-weight: 700; fill: #ffffff; }
    .sub   { font-size: 11px; font-weight: 400; fill: #94a3b8; }
  </style>
</defs>

<!-- Background -->
<rect width="780" height="160" rx="14" fill="#06060f"/>

<!-- ── Box 1: MRI Input ── -->
<rect x="16" y="40" width="118" height="72" rx="8" fill="#0d1a3e" stroke="#6366f1" stroke-width="1.5"/>
<text class="title" x="75" y="72" text-anchor="middle">MRI Input</text>
<text class="sub"   x="75" y="90" text-anchor="middle">(224 × 224)</text>

<!-- Arrow 1→2 -->
<line x1="134" y1="76" x2="158" y2="76" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── Box 2: U-Net Seg ── -->
<rect x="160" y="40" width="128" height="72" rx="8" fill="#0d2137" stroke="#42a5f5" stroke-width="1.5"/>
<text class="title" x="224" y="72" text-anchor="middle">U-Net Seg</text>
<text class="sub"   x="224" y="90" text-anchor="middle">Tumor Mask</text>

<!-- Arrow 2→3 -->
<line x1="288" y1="76" x2="312" y2="76" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── Box 3: NeuroFusionNet ── -->
<rect x="314" y="40" width="148" height="72" rx="8" fill="#1a0d2e" stroke="#8b5cf6" stroke-width="1.5"/>
<text class="title" x="388" y="68" text-anchor="middle">NeuroFusionNet</text>
<text class="sub"   x="388" y="86" text-anchor="middle">CNN-ViT</text>
<text class="sub"   x="388" y="101" text-anchor="middle">Classifier</text>

<!-- Arrow 3→4 -->
<line x1="462" y1="76" x2="486" y2="76" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── Box 4: XAI ── -->
<rect x="488" y="40" width="120" height="72" rx="8" fill="#2a2000" stroke="#f59e0b" stroke-width="1.5"/>
<text class="title" x="548" y="68" text-anchor="middle">XAI Suite</text>
<text class="sub"   x="548" y="86" text-anchor="middle">Grad-CAM</text>
<text class="sub"   x="548" y="101" text-anchor="middle">Attention</text>

<!-- Arrow 4→5 -->
<line x1="608" y1="76" x2="632" y2="76" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ── Box 5: LLM Report ── -->
<rect x="634" y="40" width="128" height="72" rx="8" fill="#2a0d1a" stroke="#e91e63" stroke-width="1.5"/>
<text class="title" x="698" y="68" text-anchor="middle">LLM Report</text>
<text class="sub"   x="698" y="86" text-anchor="middle">Clinical</text>
<text class="sub"   x="698" y="101" text-anchor="middle">Generator</text>
</svg>
